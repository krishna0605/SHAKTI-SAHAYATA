global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: shakti-backend
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics

  - job_name: shakti-postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: shakti-node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
