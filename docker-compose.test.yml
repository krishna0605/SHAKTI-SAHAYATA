services:
  postgres-test:
    image: postgres:16-alpine
    container_name: shakti-postgres-test
    environment:
      POSTGRES_DB: shakti_test_db
      POSTGRES_USER: shakti_admin
      POSTGRES_PASSWORD: shakti_password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shakti_admin -d shakti_test_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - shakti_postgres_test_data:/var/lib/postgresql/data

volumes:
  shakti_postgres_test_data:
