# ============================================================
# SHAKTI — Production Docker Compose
# All services run on-premise. Zero cloud dependencies.
# ============================================================

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 15 (No pgvector, standard image)
  # ──────────────────────────────────────────────
  postgres:
    profiles: ["local-db"]
    image: postgres:15-alpine
    container_name: shakti-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-shakti_db}
      POSTGRES_USER: ${DB_USER:-shakti_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdevpassword}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shakti_admin} -d ${DB_NAME:-shakti_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shakti-network

  # ──────────────────────────────────────────────
  # Backend — Express + Node.js API
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shakti-backend
    environment:
      DATABASE_URL: ${SUPABASE_DB_URL_POOLER:-postgresql://${DB_USER:-shakti_admin}:${DB_PASSWORD:-localdevpassword}@postgres:5432/${DB_NAME:-shakti_db}}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-shakti_db}
      DB_USER: ${DB_USER:-shakti_admin}
      DB_PASSWORD: ${DB_PASSWORD:-localdevpassword}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-shakti_refresh}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      JWT_ADMIN_ACCESS_EXPIRY: ${JWT_ADMIN_ACCESS_EXPIRY:-10m}
      JWT_ADMIN_REFRESH_EXPIRY_DAYS: ${JWT_ADMIN_REFRESH_EXPIRY_DAYS:-7}
      ADMIN_REFRESH_COOKIE_NAME: ${ADMIN_REFRESH_COOKIE_NAME:-shakti_admin_refresh}
      ADMIN_REFRESH_COOKIE_SAMESITE: ${ADMIN_REFRESH_COOKIE_SAMESITE:-strict}
      ADMIN_REFRESH_COOKIE_SECURE: ${ADMIN_REFRESH_COOKIE_SECURE:-false}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_URL: http://host.docker.internal:11434
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}
      PORT: 3001
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      CHATBOT_DIAGNOSTICS_ENABLED: ${CHATBOT_DIAGNOSTICS_ENABLED:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4174,http://localhost:3000}
      ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:-http://localhost:4174,http://localhost:5173,http://localhost:3000}
      BACKUP_STATUS_FILE: /app/runtime/backup-status.json
      RESTORE_STATUS_FILE: /app/runtime/restore-status.json
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_DB_URL_POOLER: ${SUPABASE_DB_URL_POOLER:-}
      SUPABASE_DB_URL_DIRECT: ${SUPABASE_DB_URL_DIRECT:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_STORAGE_BUCKET_EVIDENCE: ${SUPABASE_STORAGE_BUCKET_EVIDENCE:-case-evidence}
      SUPABASE_STORAGE_BUCKET_EXPORTS: ${SUPABASE_STORAGE_BUCKET_EXPORTS:-admin-exports}
      SUPABASE_STORAGE_BUCKET_QUARANTINE: ${SUPABASE_STORAGE_BUCKET_QUARANTINE:-legacy-quarantine}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - upload_data:/app/uploads
      - ./ops:/app/ops
      - ./database:/app/database:ro
      - ./shared:/shared:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shakti-network

  # ──────────────────────────────────────────────
  # AI Services — Python FastAPI
  # ──────────────────────────────────────────────
  ai-services:
    profiles: ["future"]
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: shakti-ai-services
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-phi3.5}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-60000}
      DATABASE_URL: ${SUPABASE_DB_URL_POOLER:-postgresql://${DB_USER:-shakti_admin}:${DB_PASSWORD:-localdevpassword}@postgres:5432/${DB_NAME:-shakti_db}}
      DB_SSL: ${DB_SSL:-false}
      AI_SERVICE_PORT: 8000
      AI_SERVICE_HOST: 0.0.0.0
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shakti-network

  # ──────────────────────────────────────────────
  # Frontend — React (Nginx in production)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILD_SCRIPT: build
        DIST_DIR: dist
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: shakti-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shakti-network

  admin-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILD_SCRIPT: build:admin
        DIST_DIR: dist-admin
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: shakti-admin-frontend
    ports:
      - "${ADMIN_FRONTEND_PORT:-4174}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shakti-network

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.54.1
    container_name: shakti-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shakti-network

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.2.0
    container_name: shakti-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - shakti-network

  postgres-exporter:
    profiles: ["local-db"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    container_name: shakti-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-shakti_admin}:${DB_PASSWORD:-localdevpassword}@postgres:5432/${DB_NAME:-shakti_db}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shakti-network

  node-exporter:
    profiles: ["observability-host"]
    image: prom/node-exporter:v1.8.2
    container_name: shakti-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - shakti-network

volumes:
  pgdata:
    name: shakti-pgdata
  upload_data:
    name: shakti-uploads
  prometheus_data:
    name: shakti-prometheus-data
  grafana_data:
    name: shakti-grafana-data

networks:
  shakti-network:
    name: shakti-network
    driver: bridge
