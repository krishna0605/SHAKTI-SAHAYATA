[api]
enabled = true
port = 54321
schemas = ["public", "storage", "auth"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:4174",
  "http://localhost:5173",
  "http://127.0.0.1:5173",
  "http://127.0.0.1:4174"
]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[analytics]
enabled = false
