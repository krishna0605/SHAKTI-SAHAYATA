name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=backend
        env:
          JWT_SECRET: ci_phase2_jwt_secret_value_1234567890
          JWT_ADMIN_SECRET: ci_phase2_admin_jwt_secret_value_1234567890
          NODE_ENV: test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test --workspace=frontend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

  admin-frontend-build:
    name: Admin Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin frontend
        run: npm run build:admin --workspace=frontend

  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for budget check
        run: npm run build --workspace=frontend

      - name: Check bundle budget
        run: npm run bundle:check

  compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config -q

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoke-main:
    name: Smoke Test (Main App)
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shakti_test_db
          POSTGRES_USER: shakti_admin
          POSTGRES_PASSWORD: shakti_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U shakti_admin -d shakti_test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Generate CI credentials
        run: |
          ADMIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')Aa1!"
          OFFICER_PASSWORD="$(openssl rand -base64 18 | tr -d '\n')Aa1!"
          echo "BOOTSTRAP_ADMIN_PASSWORD=$ADMIN_PASSWORD" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_OFFICER_PASSWORD=$OFFICER_PASSWORD" >> "$GITHUB_ENV"

      - name: Initialize database schema
        run: psql "$DATABASE_URL" -f database/schema.sql
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db

      - name: Bootstrap identities
        run: npm run db:bootstrap-identities
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db
          BOOTSTRAP_ADMIN_EMAIL: it.admin@police.gov.in
          BOOTSTRAP_ADMIN_FULL_NAME: SHAKTI CI Bootstrap Administrator
          BOOTSTRAP_ADMIN_MUST_CHANGE_PASSWORD: "false"

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: npm run dev:backend > backend.log 2>&1 &
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db
          DB_HOST: localhost
          DB_PORT: 5434
          DB_NAME: shakti_test_db
          DB_USER: shakti_admin
          DB_PASSWORD: shakti_password
          JWT_SECRET: ci_phase2_jwt_secret_value_1234567890
          JWT_ADMIN_SECRET: ci_phase2_admin_jwt_secret_value_1234567890
          NODE_ENV: test
          REFRESH_COOKIE_SECURE: "false"
          ADMIN_REFRESH_COOKIE_SECURE: "false"

      - name: Start frontend
        run: npm run dev:frontend > frontend.log 2>&1 &
        env:
          VITE_API_URL: http://localhost:3001

      - name: Run main smoke tests
        run: npx wait-on http-get://localhost:5173 http-get://localhost:3001/api/health && npx playwright test tests/e2e/smoke.spec.ts
        env:
          PLAYWRIGHT_OFFICER_BUCKLE_ID: BK-1001
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db
          DB_HOST: localhost
          DB_PORT: 5434
          DB_NAME: shakti_test_db
          DB_USER: shakti_admin
          DB_PASSWORD: shakti_password

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-main-logs
          path: |
            backend.log
            frontend.log
            playwright-report
            test-results

  smoke-admin:
    name: Smoke Test (Admin Console)
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - admin-frontend-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shakti_test_db
          POSTGRES_USER: shakti_admin
          POSTGRES_PASSWORD: shakti_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U shakti_admin -d shakti_test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Generate CI credentials
        run: |
          ADMIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')Aa1!"
          echo "BOOTSTRAP_ADMIN_PASSWORD=$ADMIN_PASSWORD" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_ADMIN_EMAIL=it.admin@police.gov.in" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_ADMIN_BASE_URL=http://localhost:4174" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_ADMIN_PASSWORD=$ADMIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Initialize database schema
        run: psql "$DATABASE_URL" -f database/schema.sql
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db

      - name: Bootstrap identities
        run: npm run db:bootstrap-identities
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db
          BOOTSTRAP_ADMIN_EMAIL: it.admin@police.gov.in
          BOOTSTRAP_ADMIN_FULL_NAME: SHAKTI CI Bootstrap Administrator
          BOOTSTRAP_ADMIN_MUST_CHANGE_PASSWORD: "false"

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: npm run dev:backend > backend.log 2>&1 &
        env:
          DATABASE_URL: postgresql://shakti_admin:shakti_password@localhost:5434/shakti_test_db
          DB_HOST: localhost
          DB_PORT: 5434
          DB_NAME: shakti_test_db
          DB_USER: shakti_admin
          DB_PASSWORD: shakti_password
          JWT_SECRET: ci_phase2_jwt_secret_value_1234567890
          JWT_ADMIN_SECRET: ci_phase2_admin_jwt_secret_value_1234567890
          NODE_ENV: test
          REFRESH_COOKIE_SECURE: "false"
          ADMIN_REFRESH_COOKIE_SECURE: "false"

      - name: Start admin frontend
        run: npm run dev:admin > admin.log 2>&1 &
        env:
          VITE_API_URL: http://localhost:3001
          VITE_ADMIN_APP_URL: http://localhost:4174
          VITE_MAIN_APP_URL: http://localhost:5173

      - name: Run admin smoke tests
        run: npx wait-on http-get://localhost:4174 http-get://localhost:3001/api/health && npx playwright test tests/e2e/admin-smoke.spec.ts

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-admin-logs
          path: |
            backend.log
            admin.log
            playwright-report
            test-results
